---
title: 言語処理系入門
language: ja
audience: 学部3年生くらいで、プログラミング言語処理系初心者
notes: |-
  プログラミング言語処理系の実装について、基礎を教えるテキストを書いてください。
  下記について分かりやすく書いてください。簡単なプログラミング言語を設定して、それを例にしてくれると助かります。
  下記について、項目をあげましたが、もっと他に入れたほうがいい項目があれば、どんどん入れて下さい。

  * 導入
    * プログラミング言語処理系を作る動機
    * 現実世界のプログラミング言語処理系
      * いろんな言語を紹介し、その言語処理系の特長を紹介
    * 一般的な言語処理系の作り方
      * いろんな言語の処理系について、作り方（処理系内部の流れ）の紹介
  * 基礎編　簡単な言語機構だけの言語の紹介
    * 開発する言語の機能の検討
      * 数値計算
      * 条件分岐
      * ローカル変数
      * 関数やメソッド
    * 構文解析
      * 既存の言語の構文解析器を利用
        * どういう選択肢があるか紹介してください（ハンズオンで使えるようにするために、具体的に構文木を取り出す例が欲しい）
        * 興味がある人は https://kolanglab.github.io/book_parser_intro を参照
    * 意味解析
      * あまり深入りはしないが、流れとして構文解析と実装の間にあることを示す
      * 詳細は別テキスト https://kolanglab.github.io/book_semantic_intro/#cover
    * AST walking interpreter
      * 簡単に実装（ハンズオンができるような、丁寧な内容がいいです）
    * VM
      * スタックマシンとレジスタマシン　例ではスタックマシンを利用
      * スタックマシ VM の構成要素
        * bytecode, PC, stack
      * 簡単に実装（ハンズオンができるような、丁寧な内容がいいです）
  * 応用編
    * 言語機能
      * 数値の扱い
      * コンテナ
        * 配列
        * 文字列
        * ハッシュ
        * クラスとオブジェクト
      * メモリ管理とガーベージコレクション
        * GC 詳細は別テキスト
          * https://kolanglab.github.io/book_Conservative_GC/
          * https://kolanglab.github.io/book_precise_gc/
          * https://kolanglab.github.io/book_gc_details/
      * I/O
        * 詳細は別テキスト https://kolanglab.github.io/book_lang_io/#cover
      * 言語処理系の機能拡張方法
        * どこまでが命令で、どこまでが built-in で、...
        * 拡張ライブラリの実現手法
        * FFI
      * 例外処理
        * ホスト言語の大域脱出の利用
        * 二返戻値法の利用
        * 利害得失の検討
      * クロージャー
      * 並行制御
        * Coroutine, Thread, Process, aync/await, ...
        * 並列処理
          * 詳細は別テキスト https://kolanglab.github.io/book_parallel_lang/#cover
    * 高速化
      * VMに関する高速化
        * スタックマシンとレジスタマシン、両者の比較
        * VM のスレッデッドコード
        * 命令融合
        * インラインキャッシュ
      * 一般的な最適化
        * ピープホール最適化
        * 定数畳み込み（constant folding）／定数伝播
        * デッドコード除去（DCE）
        * 共通部分式除去（CSE）
        * インライン展開（inlining）
        * ループ最適化（不変式の巻き上げ LICM、アンローリング）
        * 末尾呼び出し最適化（TCO）
        * ほかにもあれば色々紹介して
      * JIT/AOT compiler
        * コード生成について、詳細は別テキスト https://kolanglab.github.io/book_code_gen/#cover
      * Partial evaluation による compilation
      * プロファイリング機構

  注意:
  * 未使用用語は説明する
  * 例だけの (sub)section は作らない。ちゃんと説明する
  * コードを出すだけの (sub)section は作らない。ちゃんと説明する
  * 参考文献は積極的に引用する
  * 言語処理系のプログラムの例を出すときはなるべく Ruby を使う
